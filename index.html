<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Saludador</title>
  </head>
  <body>
    <h1>Saludador</h1>
    <input type="text" id="nombre-input">

    <label>Género:</label>
      <select id="genero-select">
        <option value="masculino">Masculino</option>
        <option value="femenino">Femenino</option>
      </select>

    <label>Edad:</label>
    <input type="number" id="edad-input" />

    <label>Idioma:</label>
    <select id="idioma-select">
      <option value="es">Español</option>
      <option value="en">Inglés</option>
    </select>

    <button id="saludar-button">saludar</button>
    <div id="resultado-div"></div>
    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
